version: 2

sources:
  - name: nba_source_data
    database: nba_db
    schema: player_data
    tables:
      - name: player_list
        columns:
          - name: id
            tests:
              - not_null
      - name: player_details
        columns:
          - name: id
            tests:
              - not_null
    schema: team_data
    tables:
      - name: team_list
        columns:
          - name: team_name
            tests:
              - not_null
              - unique
      - name: team_details
        columns:
          - name: team_name
            tests:
              - not_null
              - unique
      schema: reports
      tables:
        - name: game_report
          columns:
            - name: game_date
            - name: game_id
              tests:
                - unique
                - not_null
      
    
