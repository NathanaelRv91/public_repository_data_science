version: 2

sources:
  - name: snowflake_db_nba_data
    database: nba_db
    schema: player_data
    tables:
      - name: player_list
        columns:
          - name: id
            tests:
              - not_null
      - name: player_details
        columns:
          - name: id
            tests:
              - not_null
    schema: team_data
    tables:
      - name: team_list
        columns:
          - name: team_name
            tests:
              - not_null
              - unique
      - name: team_details
        columns:
          - name: team_name
            tests:
              - not_null
              - unique
      
    
