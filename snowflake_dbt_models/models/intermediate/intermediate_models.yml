version: 2

models:
  - name: player_primary_stats
    config:
    tags: "nba_player_statistics"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - season_id
            - player_id
            - team_id
    freshness:
        warn_after:
          count: 500
          period: hour
    loaded_at_field: last_updated_timestamp
    columns:
      - name: player_id
        tests:
          - not_null
              
