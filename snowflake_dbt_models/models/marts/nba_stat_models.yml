version: 2
## ALL Int/Fct Model Tests ##
models:
  - name: int_player_team_stats
    config:
      tags: "nba_all_time_stats"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - season_id
            - game_id

  - name: int_player_career_totals
    +post-hook: "SELECT * FROM {{('player_list')}} WHERE is_active = 1"
    config:
      tags: "nba_all_time_stats"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - team_id
            - player_id
            - full_name
    columns:
      - name: player_id
        tests:
          - not_null
          - relationships:
              to: ref('player_list')
      - name: team_id
        tests:
          - not_null
          - relationships:
              to: ref('team_list')
