version: 2

sources:
  - name: nba_reporting_sources
    config:
      freshness:
        warn_after: { count: 12, period: hour }
        error_after: { count: 24, period: hour }
      loaded_at_field: last_updated
    description: statistical data that includes game level stats for both players and teams since 1946
    database: 'nba_db'
    schema: reports
    tables:
      - name: all_time_player_statistics_90s
      - name: all_time_player_statistics_00s
      - name: all_time_team_statistics
        description: the source we use to compbine primary game stats with player per-game & season stats. 
        columns: 
          - name: gameid
          - name: gamedatetimeest
          - name: teamcity
          - name: teamname
          - name: teamid
            description: primary key for combining our team stats with individual player stats
          - name: opponentteamcity
          - name: opponentteamname
          - name: opponentteamid
          - name: home
            description: binary (0/1) indicator of whether the game was a home game (1) or not (0).
          - name: win
            description: inary (0/1) indicator of whether the game was won (1) or lost (0). We aggregate on this value to find season winning pct
          - name: teamscore
            description: 
          - name: opponentscore
          - name: assists
          - name: blocks
          - name: steals
          - name: fieldgoalsattempted
          - name: fieldgoalsmade
          - name: fieldgoalspercentage
          - name: threepointersattempted
          - name: threepointersmade
          - name: threpointerspercentage
          - name: freethrowsattempted
          - name: freethrowsmade
          - name: freethrowspercentage
          - name: reboundsdefensive
          - name: reboundsoffensive
          - name: reboundstotal
          - name: foulspersonal
          - name: turnovers
          - name: plusminuspoints
          - name: numminutes
          - name: q1points
          - name: q2points
          - name: q3points
          - name: q4points
          - name: benchpoints
          - name: biggestlead
          - name: biggestscoringrun
          - name: leadchanges
          - name: pointsfastbreak
          - name: pointsfromturnovers
          - name: pointsinthepaint
          - name: pointssecondchance
          - name: timestied
          - name: timeoutsremaining
          - name: seasonwins
          - name: seasonlosses
          - name: coachid
          - name: gametype
          - name: gamelabel
          - name: gamesublabel
          - name: seriesgamenumber
          - name: seed
          - name: ot1points
          - name: ot2points
          - name: ottotalpoints
          - name: gamedate
            description: timestamp of the date of the game
      - name: all_time_player_statistics
        description: we combine the first set of data from 'all_time_player_statistics_90's with 
                'all_time_player_statistics_00s' to render a full table that we feed into our intermediate models. 
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - player_id
                - team_id
                - game_id
        columns:
          - name: player_id
            tests:
              - relationships:
                  to: ref('player_details')
                  field: personid
          - name: index
          - name: first_name
          - name: last_name
          - name: game_id
          - name: game_date
            description: timestamp we use to pull the game year from. We use a month filter to ensure we get the season correct
          - name: player_team_city
          - name: player_team_name
          - name: opp_team_city
          - name: opp_team_name
          - name: season_type
          - name: gm_label
          - name: gm_sublabel
          - name: gm_number
          - name: win
          - name: home
          - name: min_played
          - name: points
          - name: assists
          - name: blocks
          - name: steals
          - name: fga
          - name: fgm
          - name: fg_pct
          - name: pt3_att
          - name: pt3_fgm
          - name: pt3_pct
          - name: fta
          - name: ftm
          - name: ft_pct
          - name: drb
          - name: orb
          - name: trb
          - name: pf
          - name: tos
          - name: plus_minus
          - name: player_team_id
          - name: opp_team_id
          - name: comment
          - name: pos
          - name: game_timestamp
          - name: YEAR_INT
            description: we pull the 4 digit year (YYYY) so we can map our game data for players to the team stat table(s)
       - name: game_report
         description: our second game data table that can be used to gather any missing information from the primary source table: 'all_time_team_statistics'
       - name: game_report_other_stats
         description: contains secondary stats that we can pull in for more context once we have a fully functional front-end model that's queryable
  - name: player_sources
    description: Player list of all players in history with a unique profile. This schema includes the alternative dataset we use for secondary player stat profiles. 
    database: 'nba_db'
    schema: player_data
    tables:
      - name: player_list
        description: this is a simple list of all players in NBA history. It's less comprehensive so we only use it as a flag for active vs inactive players by full_name when we are missing career data
        columns: 
          - name: id
          - name: full_name
          - name: first_name
          - name: last_name
          - name: is_active
            description: is a Binary (0/1) indicator of whether or not the player is active and still playing
      - name: player_details
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                 - player_id
                 - first_name
        columns: 
          - name: personid
            description: primary key to map each player to their performance stats in the 'all_time_player_statistics' table.
          - name: firstname
          - name: lastname
          - name: birthdate
          - name: school 
          - name: heightinches
          - name: bodyweightlbs
          - name: country
            description: Where the player was born and location before joining the NBA.
          - name: jersey
          - name: guard
            escription: binary 0/1 indicator of whether or not the player every played the guard position
          - name: forward
            escription: binary 0/1 indicator of whether or not the player every played the forward position
          - name: center
            description: binary 0/1 indicator of whether or not the player every played the center position
          - name: dleagueflag
            description: binary 0/1 indicator of whether or not the player every played in the D-league
          - name: nbaflag
            description: binary 0/1 indicator of whether or not the player every played in the NBA
          - name: draftround
            description: what round the player was drafted in the year they were drafted. 
          - name: draftyear
            description: what year the player was drafted. 
          - name: draftnumber
            description: what number the player was in the year they were drafted. 
          - name: fromyear
            description: the rookie year for the player. 
          - name: toyear
            description: the last year the player played. So if the field was 2002; the player played their last game in spring 2023. The default value for an active player is 2100.
  - name: team_sources
    description: unique team records along with a full history of when teams were founded, changed cities or joined the NBA from the ABA. 
    database: 'nba_db'
    schema: team_data
    tables:
      - name: team_list
        columns: 
          - name: ID
            description: primary key for joining the team dimensions to our fact tables with player/team stats.
          - name: abbreviation
          - name: full_name
            description: full team name as it appears in the media & on sports shows. 
          - name: city
          - name: state
          - name: year_founded
            description: The 4 digit year the team started (YYYY). This includes the pre-merger leagues. 
      - name: team_details
        description: any other context we want to provide for each team by player or team (only) in our models
        columns: 
          - name: team_id 
            description: primary key to join to 'team_list' before we can add all company dimensions to our stat models
          - name: abbreviation
          - name: city
          - name: arena
          - name: arenacapacity
          - name: owner
          - name: generalmanager
          - name: headcoach
          - name: dleagueaffiliation
            description: if we have a player with a team and dleagueflag = 1, we can lookup their d-league team name.
          - name: facebook
            description: url to the team's homepage on the social platform
          - name: instagram
            description: url to the team's homepage on the social platform
          - name: twitter
            description: url to the team's homepage on the social platform
      - name: team_history
        description: This table contains all records by teamid for when they changed leagues or cities. We can track ABA history and map to a player that played before the 1976 merger
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - teamid
                - seasonactivetil
        columns: 
          - name: teamid
          - name: seasonactivetil
          - name: league
          - name: teamcity
          - name: teamname
          - name: teamabbrev
          - name: seasonfounded
      
    
