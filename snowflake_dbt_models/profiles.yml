snowflake_db_nba_data:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: abc12345.us-east-1      # Your Snowflake account identifier (exclude .snowflakecomputing.com)
      user: your_username             # Snowflake username (not your email)
      password: your_password         # Snowflake password
      role: transformer_role          # The Snowflake role dbt should assume
      warehouse: transforming_wh      # The virtual warehouse used for compute
      database: analytics             # The target database where tables are built
      schema: dbt_jdoe                # Your development schema (usually dbt_<initial><lastname>)
      threads: 4   
